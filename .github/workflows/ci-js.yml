name: CI (JS reader)

# Lint/typecheck/test the TypeScript reader workspace (js/). The schema-drift
# test runs inside `npm test`, pinning the bundled manifest schema to the
# Python source of truth.
on:
  push:
    paths:
      - "js/**"
      - ".github/workflows/ci-js.yml"
  pull_request:
    paths:
      - "js/**"
      - ".github/workflows/ci-js.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: js/package-lock.json
      - name: Install, typecheck, and test
        working-directory: js
        run: |
          npm ci
          npm run typecheck
          npm test
